<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* desktop default */
#office {
  position: fixed;
  top: 0;
  left: 0;
  padding: 20px;
  font-family: 'Times New Roman', Times, serif;
}

/* mobile adjustment only */
@media (max-width:600px){
  #office{
    font-size: 1.4rem;
  }
}
</style>

</head>

<body>

<div id="office">
  Office Edward Rollins<br>
  <span id="time" style="color:blue;"></span><br><br>
  <a href="mailto:teddy@edwardrollins.com" target="_blank">
    <button>Contact</button>
  </a>
</div>

<script>
function updateTime() {
  document.getElementById("time").textContent = new Date().toLocaleString();
}

updateTime();
setInterval(updateTime, 1000);
</script>

</body>
</html>
