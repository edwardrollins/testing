<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
button{
  font-family:'Times New Roman', Times, serif;

  /* remove browser styling */
  appearance:none;
  -webkit-appearance:none;

  /* recreate desktop button look */
  padding:2px 6px;
  border:1px solid #000;
  border-radius:4px;
  background:#eee;
  color:#000;
  font-size:14px;
  cursor:pointer;
}
</style>

</head>

<body>

<div style="position:fixed; top:0; left:0; padding:20px; font-family:'Times New Roman', Times, serif;">
  Office Edward Rollins<br>
  <span id="time" style="color:blue;"></span><br><br>
  <a href="mailto:teddy@edwardrollins.com" target="_blank">
    <button>Contact</button>
  </a>
</div>

<script>
function updateTime(){
  document.getElementById("time").textContent = new Date().toLocaleString();
}

updateTime();
setInterval(updateTime,1000);
</script>

</body>
</html>
